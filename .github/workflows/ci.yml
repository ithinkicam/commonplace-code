name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt JavaScript actions (checkout, setup-python, etc.) into Node.js 24.
  # Default flips to Node 24 on 2026-06-02; we're early-adopting.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check commonplace_server commonplace_worker tests

      - name: Format check (ruff)
        run: ruff format --check commonplace_server commonplace_worker tests

      - name: Type-check (mypy)
        run: mypy commonplace_server commonplace_worker

      - name: Test (pytest)
        run: pytest tests/ -v
