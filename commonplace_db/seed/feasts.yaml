# feasts.yaml
# Pilot corpus for the Commonplace liturgical-ingest project.
#
# SCHEMA (per entry):
#   primary_name:               required
#   alternate_names:            optional list, default []
#   tradition:                  anglican | byzantine | roman | shared
#   calendar_type:              fixed | movable | commemoration
#   date_rule:                  see grammar below
#   precedence:                 principal_feast | holy_day | lesser_commemoration | ferial
#   theological_subjects:       list of tags from theological_subjects.yaml OR prefixed _other:
#   cross_tradition_equivalent: slug of equivalent feast in another tradition, optional
#   trial_use:                  bool, default false (LFF "[bracketed]" entries)
#   source:                     lff_2024 | bcp_1979 | menaion | local
#
# DATE-RULE GRAMMAR:
#   MM-DD                              fixed date
#   easter±N                           offset from the tradition's Easter:
#                                        Western computus for tradition ∈ {anglican, roman}
#                                        Eastern computus for tradition = byzantine
#   advent_1±N                         offset from First Sunday of Advent
#   {weekday}_on_or_after_MM-DD        e.g., sunday_on_or_after_11-27
#   {weekday}_after_MM-DD              strict "after"; skip MM-DD if it is that weekday
#   first_sunday_after_MM-DD           alias retained for readability
#   fourth_thursday_of_november        (one-off for Thanksgiving)
#   (free string)                      for commemorations without a rule
#
# SECTIONS:
#   1. BCP 1979 Principal Feasts, Sundays of the Church Year, Ember & Rogation Days
#   2. BCP 1979 Holy Days (fixed-date Major Feasts + National Days)
#   3. LFF 2024 Lesser Feasts & Fasts + non-LFF gender-crossing additions
#   4. Byzantine cross-tradition equivalents

# ============================================================================
# Section 1 — BCP 1979 Principal Feasts, Sundays, Ember & Rogation Days
# ============================================================================

