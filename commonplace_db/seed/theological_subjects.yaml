# theological_subjects.yaml
# Controlled vocabulary for the `theological_subjects` field on feast entries.
# A tag on a feast must either appear in this list (bare, e.g. `incarnation`)
# or be prefixed with `_other:` (the escape hatch for long-tail concepts).
#
# 71 subjects. Long-tail `_other:` tags that recur across the corpus can be
# promoted here in future sweeps.

- subject: apologetics
  definition: the reasoned defense and commendation of the faith

- subject: apostle
  definition: the apostolic vocation; sending, witness, and the apostolic deposit

- subject: ascension
  definition: Christ's enthronement at the Father's right hand; his heavenly priesthood

- subject: asceticism
  definition: askesis, fasting, and bodily discipline as the shaping of desire

- subject: baptism
  definition: initiation into Christ's death and resurrection

- subject: catechesis
  definition: the teaching of the faith to the baptized and catechumen

- subject: church
  definition: the body of Christ; ecclesiology, apostolic communion

- subject: communion_of_saints
  definition: the Church across time as one body in Christ

- subject: contemplation
  definition: the contemplative life; prayer as unmediated attention

- subject: conversion
  definition: turning to Christ; the reorientation of a life

- subject: creation
  definition: doctrine of creation; creaturely goodness and stewardship

- subject: cross
  definition: the cross as salvific instrument and figure of Christian life

- subject: devotion
  definition: the cultivation of interior piety; the devotional tradition

- subject: diaconate
  definition: the diaconal office of service and proclamation

- subject: discipleship
  definition: following Jesus; the formation of the disciple

- subject: doctrine
  definition: guardianship and articulation of the apostolic faith against error

- subject: ecumenism
  definition: the movement toward Christian unity

- subject: education
  definition: teaching and formation as Christian vocation

- subject: episcopate
  definition: the office of bishop; the historic episcopate as sign of apostolic continuity

- subject: eschatology
  definition: the last things; the consummation of all things in Christ

- subject: eucharist
  definition: the holy mysteries; thanksgiving, communion, sacrifice

- subject: evangelist
  definition: the office of gospel-writer; the written proclamation of Christ

- subject: friendship
  definition: philia as theological category; the love between particular persons before God

- subject: gender_crossing
  definition: lives whose holiness is read through their crossing of gender categories

- subject: gentile_inclusion
  definition: the opening of the covenant to those outside Israel; the theology of Luke-Acts

- subject: grace
  definition: the unmerited divine favor; the Spirit's operation on the human person

- subject: healing
  definition: restoration of body and soul; Christ as physician

- subject: holy_spirit
  definition: the person and work of the Paraclete; Pentecost, charisms, indwelling

- subject: hospitality
  definition: welcome of stranger, poor, and Christ in them (Matt 25)

- subject: hymnography
  definition: the composition of hymns; liturgical song

- subject: icons
  definition: the theological defense of images; the iconodule tradition

- subject: incarnation
