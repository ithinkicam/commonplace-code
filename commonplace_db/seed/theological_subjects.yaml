- subject: music
  definition: sacred music and the musician's vocation

- subject: mysticism
  definition: direct experiential knowledge of God; the mystical tradition

- subject: passion
  definition: Christ's suffering and death; the paschal narrative proper

- subject: penitence
  definition: repentance, metanoia, the turning of the heart

- subject: poetry
  definition: the poetic vocation as theological craft

- subject: poverty
