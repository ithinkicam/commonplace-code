- subject: theotokos
  definition: "The God-bearer; title of the Virgin Mary affirmed at the Council of Ephesus (431)."
- subject: kenosis
  definition: "The self-emptying of Christ in the Incarnation (Phil 2:7)."
- subject: resurrection
  definition: "The bodily rising of Christ from the dead on the third day."
- subject: incarnation
  definition: "The eternal Son taking human flesh in the womb of the Virgin Mary."
- subject: martyrdom
  definition: "Death accepted for the sake of the faith."
- subject: penitence
  definition: "Contrition, confession, and amendment of life."
- subject: advent
  definition: "The season of preparation for the Nativity and the Second Coming."
- subject: epiphany
  definition: "The manifestation of Christ to the Gentiles."
