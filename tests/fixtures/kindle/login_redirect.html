<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Amazon Sign-In</title></head>
<body>
<div id="ap_signin_form_container">
  <form method="post" id="ap_signin_form" action="https://www.amazon.com/ap/signin">
    <input type="email" name="email" id="ap_email" placeholder="your@email.com" />
    <input type="password" name="password" id="ap_password" />
    <input type="submit" id="signInSubmit" value="Sign-In" />
  </form>
</div>
</body>
</html>
